# Пример конфигурации ForgeRace для проекта EthOS

[project]
name = "EthOS"
context = "ядра EthOS (bare-metal Rust, x86_64, no_std)"
root = "/home/dms/work/ethos"
dev_branch = "develop"
tasks_file = "TASKS.md"
discuss_dir = "docs/discuss"

[agents.claude]
command = "claude"
args = ["-p", "--allowedTools", "Read,Write,Edit,Bash,Grep,Glob", "--max-turns", "50", "--output-format", "stream-json", "--verbose"]
review_args = ["-p", "-", "--output-format", "text", "--permission-mode", "auto"]
inactivity_timeout = 300

[agents.gemini]
command = "gemini"
args = ["-p", "--approval-mode", "yolo", "--output-format", "stream-json"]
review_args = ["-p", "-"]
inactivity_timeout = 180

[build]
commands = [
    ["cargo", "build"],
    ["cargo", "test", "--no-run"],
]
check_command = "make check"
timeout = 120

[limits]
max_parallel_tasks = 4
agent_timeout = 900
max_review_rounds = 3
max_task_complexity = 3

[rules]
agent_rules = """
1. Трогай ТОЛЬКО файлы из секции "Файлы" выше.
2. Интеграцию делай ТОЛЬКО в файлах из "Файлы (modify)".
3. НЕ реализуй функциональность из других задач.
4. Прочитай существующий код чтобы понять контекст, но НЕ изменяй его.
5. Пиши комментарии на русском.
6. unsafe — минимум, инкапсулируй в safe обёртки.
7. НИКОГДА не удаляй существующий код, не относящийся к задаче.
8. Работай ТОЛЬКО в текущей директории. НЕ делай cd в другие директории.
"""
